<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Analisador de Falhas - Motor</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      background: #0070f3;
      color: white;
      border: none;
      cursor: pointer;
    }
    .resultado {
      margin-top: 15px;
      padding: 10px;
      background: #eee;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>🔧 Analisador de Falhas</h2>

    <label>Tipo de Partida:</label>
    <select id="tipo">
      <option value="direta">Direta</option>
      <option value="reversora">Reversora</option>
    </select>

    <br><br>

    <label>Corrente (A):</label>
    <input type="number" id="corrente">

    <br><br>

    <label>Tempo de partida (s):</label>
    <input type="number" id="tempo">

    <br><br>

    <label><input type="checkbox" id="K1"> Contator K1</label><br>
    <label><input type="checkbox" id="K2"> Contator K2</label>

    <br>

    <button onclick="analisar()">Analisar</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <script>
    function analisar() {
      const tipo = document.getElementById("tipo").value;
      const corrente = parseFloat(document.getElementById("corrente").value);
      const tempo = parseFloat(document.getElementById("tempo").value);
      const K1 = document.getElementById("K1").checked;
      const K2 = document.getElementById("K2").checked;

      let falhas = [];

      // 🔴 Falha: reversão sem intertravamento
      if (tipo === "reversora") {
        if (K1 && K2) {
          falhas.push("❌ Curto entre contatores (K1 e K2 ligados)");
        }
      }

      // 🔴 Sobrecorrente
      if (corrente > 10) {
        falhas.push("⚠️ Sobrecorrente detectada");
      }

      // 🔴 Tempo excessivo
      if (tempo > 5) {
        falhas.push("⚠️ Tempo de partida muito alto");
      }

      // 🔴 Nenhum contator ligado
      if (!K1 && !K2) {
        falhas.push("⚠️ Nenhum contator acionado");
      }

      let resultado = document.getElementById("resultado");

      if (falhas.length === 0) {
        resultado.innerHTML = "✅ Sistema funcionando normalmente";
      } else {
        resultado.innerHTML = falhas.join("<br>");
      }
    }
  </script>

</body>
</html>
